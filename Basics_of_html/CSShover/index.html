<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSShover</title>
    <style>
        .Box{
            background-color: blueviolet;
            height: 100px;
            width:100px;
            text-align:center;
            color: white;
            margin:auto;
            transition:3s;

        }
        /* Hover-When we Move our Mouse and it changes the style */
        #magic:hover{
            transform: scale(1.2);
            background-color:red;
            /* transform: rotate(360deg); */
            /* transform: rotateX('360deg'); */
            transform: rotateY('360deg');
            /* transform: translateX(100px); */
            /* transform: translateY(-100px); */
            transform: translateY(100px);
        }
    </style>
</head>
<body>
    <div class="Box" id="magic">
        Box

    </div>
</body>
</html>
