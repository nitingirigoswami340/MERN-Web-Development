<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select_tag</title>
</head>
<body>
    <select >
        <option disabled>English</option>
        <option label="usa">United States of America</option>
        <option label="Hi">Hindi</option>
        <option >Tamil</option>
        <option >Marathi</option>
        <option >Telugu</option>
        <option selected>Language</option>
        <option disabled>French</option>
    </select>
    <input list="menu">
    <datalist id="menu">
        <option value="pizza">
        <option value="pasta">
        <option value="biryani">
        <option value="coke">
        <option value="biryani">
        <option value="burger">

    </datalist>
</body>
</html>
