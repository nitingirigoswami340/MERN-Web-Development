<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
             background-color: bisque;
             font-family:Arial, Helvetica, sans-serif;
             display:flex;
             /* it will change the divs in row format */
             justify-content: center;
             align-items: center;
        }
        .product{
            background-color: white;
            border:1px solid brown;
             margin: 30px;  
             /* it will change the gap outside the border */ 

            padding:25px;
            /* it will change the gap outside the border */
            text-align: center;
            border-radius:12px;
            width:300px;
            box-shadow: -6px 0 black;
            box-shadow: -6px 12px 12px black;
        }
        .product img{
            width:100%;
            height: 300px; 
            object-fit: cover;
            border-radius: 12px;
            /* for clear image */
        }
        .product button{
            background-color: orange;
            border:none;
            padding:15px;
            /* to increase button size */
            border-radius: 12px;
            color: white;
            cursor: pointer;
            /* jab bhi cursor button par jayega toh hath ban jayega */
        }
        button:hover{
            background-color: darkgoldenrod;
            /* jab hover karega toh color change hoga */
            transition: 2s;
            /* time delay change hone mein */
            transform:scale(1.02);
            /* jab cursor le jayege toh button bada ho jayega */
        }

    </style>
</head>
<body>
    <div class="product">
        <img src="https://images.pexels.com/photos/27375810/pexels-photo-27375810.jpeg"  alt="">
        <h2>Iphone</h2>
        <p>$50</p>
        <button>Add To Cart</button>
    </div>
     <div class="product">
        <img src="https://images.pexels.com/photos/16350687/pexels-photo-16350687.jpeg"  alt="">
        <h2>Shoes</h2>
        <p>$25</p>
        <button>Add To Cart</button>
    </div>
     <div class="product">
        <img src="https://images.pexels.com/photos/30250930/pexels-photo-30250930.jpeg"  alt="">
        <h2>Watch</h2>
        <p>$30</p>
        <button>Add To Cart</button>
    </div>
     <div class="product">
        <img src="https://images.pexels.com/photos/6779410/pexels-photo-6779410.jpeg"  alt="">
        <h2>Laptop</h2>
        <p>$70</p>
        <button>Add To Cart</button>
    </div>
    
    
</body>
</html>
