<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
    <style>
        .stores{
            display:grid;
            grid-template-columns: repeat(3,1fr);
            /* repeat(No of Columns ,Size of each column) */
            gap: 25px;
            background-color: lightblue;
        }
        .product{
            background-color: antiquewhite;
            border: 1px solid black;
            padding:20px;
            font-weight:bold;
        }
    </style>
</head>
<body>
    <div class="stores">
        <div class="product">Product1</div>
        <div class="product">Product2</div>
        <div class="product">Product3</div>
        <div class="product">Product4</div>
        <div class="product">Product5</div>
        <div class="product">Product6</div>


    </div>
    
</body>
</html>
